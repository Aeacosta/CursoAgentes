<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes guardados — Code Review Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ══ Sidebar ══════════════════════════════════════════════════════════════ -->
<aside class="sidebar">
  <a class="sidebar-brand" href="/">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#a50000" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
    </svg>
    <div>
      <div class="sidebar-brand-text">CodeReview<span style="color:#a50000">Agent</span></div>
      <div class="sidebar-brand-sub">RAG + LLM · Clean Code</div>
    </div>
  </a>

  <div class="sidebar-section-title">Análisis</div>
  <ul class="sidebar-nav">
    <li>
      <a href="/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Nuevo análisis
      </a>
    </li>
    <li>
      <a href="/reports" class="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Reportes guardados
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">Curso IA 360</div>
</aside>

<!-- ══ Main wrapper ══════════════════════════════════════════════════════════ -->
<div class="main-wrap">

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-title">Reportes guardados</span>
    <span class="topbar-sub">Archivos .json y .md en <code style="font-size:11px;background:#f5f6fa;padding:1px 5px;border-radius:3px;border:1px solid #e9eef4">Respuestas/</code></span>
    <span class="topbar-spacer"></span>
    <span class="topbar-badge">RAG + LLM</span>
  </div>

  <main>

    <!-- ── File picker card ───────────────────────────────────────────────── -->
    <div class="card">
      <div class="card-header">
        <h2>Reportes guardados</h2>
      </div>

      <div id="file-list-wrap">
        <div id="file-list-loading" style="color:#9b9b9b;font-size:13px">Cargando lista…</div>
        <div id="file-list-error" class="alert-error" style="display:none"></div>
        <ul id="file-list" class="report-file-list"></ul>
      </div>
    </div>

    <!-- ── Report viewer card ─────────────────────────────────────────────── -->
    <div class="card" id="viewer-card" style="display:none">
      <div class="report-toolbar">
        <h2 id="viewer-title">Reporte</h2>
        <div style="display:flex;gap:8px">
          <button class="btn-secondary" id="download-btn">&#x2B07; Descargar</button>
          <button class="btn-secondary" id="close-btn">&#x2715; Cerrar</button>
        </div>
      </div>
      <div id="viewer-body"></div>
    </div>

  </main>

  <footer>Made with ❤ · Curso IA 360</footer>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
<script src="{{ url_for('static', filename='reports.js') }}"></script>
</body>
</html>

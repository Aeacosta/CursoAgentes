<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes guardados — Code Review Agent</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
  </svg>
  <h1>Code Review Agent</h1>
  <span>Powered by Clean Code · RAG + LLM</span>
  <nav class="header-nav">
    <a href="/" class="nav-link">&#x25B6; Nuevo análisis</a>
    <a href="/reports" class="nav-link nav-link--active">&#x1F4C2; Reportes</a>
  </nav>
</header>

<main>

  <!-- ── File picker card ───────────────────────────────────────────────── -->
  <div class="card">
    <h2>Reportes guardados</h2>
    <p style="font-size:13px;color:#57606a;margin-bottom:16px">
      Archivos <code>.json</code> y <code>.md</code> encontrados en la carpeta <code>Respuestas/</code>.
      Selecciona uno para visualizarlo.
    </p>

    <div id="file-list-wrap">
      <div id="file-list-loading" style="color:#57606a;font-size:13px">Cargando lista…</div>
      <div id="file-list-error"   class="alert-error" style="display:none"></div>
      <ul id="file-list" class="report-file-list"></ul>
    </div>
  </div>

  <!-- ── Report viewer card ────────────────────────────────────────────── -->
  <div class="card" id="viewer-card" style="display:none">
    <div class="report-toolbar">
      <h2 id="viewer-title">Reporte</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" id="download-btn">&#x2B07; Descargar</button>
        <button class="btn-secondary" id="close-btn">&#x2715; Cerrar</button>
      </div>
    </div>
    <div id="viewer-body"></div>
  </div>

</main>

<footer>Curso IA 360</footer>

<script src="{{ url_for('static', filename='main.js') }}"></script>
<script src="{{ url_for('static', filename='reports.js') }}"></script>
</body>
</html>
